hydra:
  run:
    dir: ./

tacto:
  width: 20
  height: 20
  visualize_gui: True
  show_depth: True
  zrange: 0.003
  config_path: conf/sensor/config_tac3d_local.yml

digit:
  urdf_path: "assets/sensor/tacto_debug_carrier.urdf"
  base_position: [0, 0, 0]
  # base_orientation: [, 0.0, 0.0, 0.70710678]
  base_orientation: [0.0, -0.70710678, 0.0, 0.70710678]
  use_fixed_base: True

object:
  urdf_path: "assets/object/sphere_small.urdf"
  base_position: [0.02, 0, 0.02]
  global_scaling: 0.15

object_control_panel:
  slider_params:
    position_low: [-0.02, -0.01, -0.02]
    position_high: [0.02, 0.01, 0.02]

pybullet_camera:
  cameraDistance: 0.12
  cameraYaw: 90.
  cameraPitch: -45.
  cameraTargetPosition: [0, 0, 0]
